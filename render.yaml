# Blueprint Render: PostgreSQL (Docker, serviço privado) + API Spring (Docker)
# Conecte este repositório em: Dashboard → New → Blueprint
#
# Depois do deploy, defina APP_CORS_ALLOWED_ORIGINS com a URL do front (Vercel).

services:
  - type: pserv
    name: fffinance-postgres
    runtime: docker
    dockerfilePath: ./docker/postgres/Dockerfile
    plan: starter
    envVars:
      - key: POSTGRES_USER
        value: portal
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: portal
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  - type: web
    name: fffinance-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://fffinance-postgres:5432/portal
      - key: SPRING_DATASOURCE_USERNAME
        value: portal
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          type: pserv
          name: fffinance-postgres
          envVarKey: POSTGRES_PASSWORD
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://fffinance-personal.vercel.app,http://localhost:4200
      - key: APP_UPLOAD_AVATARS_DIR
        value: /tmp/fffinance-avatars
