# Perfil prod (Render).
# Banco: defina SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME e SPRING_DATASOURCE_PASSWORD
# no painel (Spring Boot lê essas variáveis automaticamente — não use placeholder aqui).

server.port=${PORT:8080}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Render/Docker: processo roda como user "spring" sem permissão de escrita em /app.
# Avatares em /tmp (ephemeral disk — perdidos em redeploy; reenvie a foto se necessário).
app.upload.avatars-dir=${APP_UPLOAD_AVATARS_DIR:/tmp/fffinance-avatars}
