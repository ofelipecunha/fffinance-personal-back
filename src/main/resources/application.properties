spring.application.name=portal

# CORS (vírgula para várias origens; sobrescrito em prod via APP_CORS_ALLOWED_ORIGINS)
app.cors.allowed-origins=http://localhost:4200

# PostgreSQL (ajuste se mudar host/porta/banco)
spring.datasource.url=jdbc:postgresql://localhost:5432/portal
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway: cria/atualiza o schema antes do Hibernate validar (ex.: tabelas lista_compra).
# baseline-on-migrate: banco já existente com outras tabelas, sem histórico Flyway.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# JPA: validate = não altera o schema (DDL vem das migrações Flyway + scripts manuais antigos)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Upload de avatar (pasta relativa ao diretório de trabalho do processo)
app.upload.avatars-dir=data/avatars
# Tamanho máximo do ficheiro de imagem (MB) — deve ser <= spring.servlet.multipart.max-file-size
app.upload.max-avatar-mb=25

# Multipart: max-request-size deve ser > max-file-size (boundaries + metadados contam no tamanho do pedido)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=40MB

# Tomcat: corpo POST >= limite do pedido multipart acima
server.tomcat.max-http-form-post-size=45MB
server.tomcat.max-swallow-size=45MB
